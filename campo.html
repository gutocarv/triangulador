<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Japi — Campo</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0f0a; --panel:#111811; --border:#1e2e1e;
  --accent:#4ade80; --accent2:#60a5fa; --accent3:#f97316; --accent4:#e3b341;
  --text:#e8f5e8; --text2:#86a886; --text3:#4a6a4a; --danger:#f87171;
  --mono:'Space Mono',monospace; --sans:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden}

/* ── HEADER ── */
.header{background:var(--panel);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-title{font-family:var(--mono);font-size:13px;color:var(--accent);font-weight:700}
.header-sub{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);transition:background 0.3s}
.sync-dot.ok{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.sync-dot.err{background:var(--danger)}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px}

/* ── CARDS ── */
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-head{padding:10px 14px 8px;font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border)}
.card-body{padding:12px 14px}

/* ── OBSERVER ── */
.observer-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:4px}
.obs-btn{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 8px;cursor:pointer;text-align:center;transition:border-color 0.15s,background 0.15s;color:var(--text2)}
.obs-btn b{display:block;font-size:13px;color:var(--text);margin-bottom:2px}
.obs-btn span{font-size:10px;font-family:var(--mono);color:var(--text3)}
.obs-btn.selected{border-color:var(--accent);background:rgba(74,222,128,0.08)}
.obs-btn.selected b{color:var(--accent)}
.obs-btn.selected span{color:rgba(74,222,128,0.5)}
.gps-badge{font-size:10px;font-family:var(--mono);padding:5px 9px;border-radius:6px;background:var(--bg);border:1px solid var(--border);color:var(--text3);white-space:nowrap;line-height:1.4;text-align:center}
.gps-badge.ok{border-color:var(--accent);color:var(--accent)}
.gps-badge.searching{border-color:var(--accent2);color:var(--accent2);animation:pulse 1.5s infinite}

/* ── VIEWFINDER ── */
.viewfinder-wrap{position:relative;width:100%;height:0;padding-bottom:75%;background:#000;border-radius:10px;overflow:hidden}
.viewfinder-wrap>*{position:absolute;top:0;left:0;width:100%;height:100%}
#videoEl{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:block}
.vf-overlay{position:absolute;inset:0;pointer-events:none}

/* Crosshair */
.crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px}
.crosshair::before,.crosshair::after{content:'';position:absolute;background:rgba(74,222,128,0.9)}
.crosshair::before{width:2px;height:100%;left:50%;top:0;transform:translateX(-50%)}
.crosshair::after{height:2px;width:100%;top:50%;left:0;transform:translateY(-50%)}
.crosshair-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;border:1.5px solid rgba(74,222,128,0.6);border-radius:50%}

/* Corner brackets */
.corner{position:absolute;width:20px;height:20px;border-color:rgba(74,222,128,0.8);border-style:solid}
.corner.tl{top:12px;left:12px;border-width:2px 0 0 2px}
.corner.tr{top:12px;right:12px;border-width:2px 2px 0 0}
.corner.bl{bottom:12px;left:12px;border-width:0 0 2px 2px}
.corner.br{bottom:12px;right:12px;border-width:0 2px 2px 0}

/* HUD overlay — dados sobre o vídeo */
.hud-top{position:absolute;top:0;left:0;right:0;padding:8px 12px;background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent);display:flex;justify-content:space-between;align-items:flex-start}
.hud-az{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--accent);line-height:1;text-shadow:0 1px 4px rgba(0,0,0,0.8)}
.hud-az span{font-size:12px;color:var(--text2)}
.hud-right{text-align:right;font-family:var(--mono);font-size:11px;color:var(--text2);line-height:1.7;text-shadow:0 1px 4px rgba(0,0,0,0.8)}
.hud-elev{font-size:13px}
.hud-elev.warn{color:var(--accent4)}
.hud-bottom{position:absolute;bottom:0;left:0;right:0;padding:8px 12px;background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);display:flex;justify-content:space-between;align-items:flex-end}
.hud-observer{font-family:var(--mono);font-size:11px;color:var(--text2);text-shadow:0 1px 4px rgba(0,0,0,0.8)}
.hud-time{font-family:var(--mono);font-size:10px;color:var(--text3);text-shadow:0 1px 4px rgba(0,0,0,0.8)}

/* Elevação indicator — linha horizontal mostrando o horizonte */
.horizon-line{position:absolute;left:0;right:0;height:1px;background:rgba(96,165,250,0.5);transition:top 0.1s;pointer-events:none}

/* Shutter */
.shutter-wrap{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:10px}
.shutter-btn{width:64px;height:64px;border-radius:50%;border:3px solid var(--accent);background:rgba(74,222,128,0.1);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;transition:all 0.1s;flex-shrink:0}
.shutter-btn:active{transform:scale(0.92);background:rgba(74,222,128,0.3)}
.shutter-btn:disabled{opacity:0.3;cursor:not-allowed}
.flip-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:16px;color:var(--text2);display:flex;align-items:center;justify-content:center}
.flip-btn:active{background:var(--panel)}

/* Camera error state */
.camera-error{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:24px;text-align:center;color:var(--text3);font-size:13px;font-family:var(--mono)}
.camera-error .err-icon{font-size:32px}
.camera-error button{padding:8px 16px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text2);font-family:var(--mono);font-size:11px;cursor:pointer}

/* Preview after capture */
.capture-preview{display:none;margin-top:10px}
.capture-preview-inner{display:flex;gap:10px;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px}
.capture-preview img{width:64px;height:64px;object-fit:cover;border-radius:6px;flex-shrink:0}
.capture-preview-data{flex:1;min-width:0}
.capture-preview-az{font-family:var(--mono);font-size:13px;color:var(--accent);font-weight:700}
.capture-preview-dir{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:2px}
.capture-preview-size{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:2px}
.capture-clear{background:none;border:none;color:var(--danger);font-size:18px;cursor:pointer;padding:4px}

/* Progress */
.photo-progress{height:3px;background:var(--border);border-radius:2px;overflow:hidden;display:none;margin-top:6px}
.photo-progress-bar{height:100%;background:var(--accent2);width:0%;transition:width 0.3s;border-radius:2px}
.photo-status{font-size:11px;font-family:var(--mono);color:var(--text3);margin-top:4px;text-align:center}
.photo-status.ok{color:var(--accent)}
.photo-status.err{color:var(--danger)}
.photo-status.uploading{color:var(--accent2);animation:pulse 1s infinite}

/* Target input */
.target-input{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:15px;padding:11px 14px;outline:none;width:100%}
.target-input:focus{border-color:var(--accent2)}
.target-input::placeholder{color:var(--text3)}

/* Register button */
.register-btn{width:100%;padding:17px;border:none;border-radius:12px;background:var(--accent);color:#000;font-family:var(--mono);font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:opacity 0.15s,transform 0.1s;display:flex;align-items:center;justify-content:center;gap:10px}
.register-btn:disabled{opacity:0.35;cursor:not-allowed}
.register-btn:not(:disabled):active{transform:scale(0.98)}

/* Recent */
.recent-item{padding:9px 0;border-bottom:1px solid var(--border);font-size:12px;font-family:var(--mono);color:var(--text2);line-height:1.7}
.recent-item:last-child{border-bottom:none}
.recent-item b{color:var(--accent)}
.recent-empty{text-align:center;padding:16px 0;color:var(--text3);font-size:12px;font-family:var(--mono)}

/* Compass (compact, below viewfinder) */
.compass-mini{display:flex;align-items:center;gap:12px;padding:8px 0}
.compass-mini-ring{position:relative;width:48px;height:48px;flex-shrink:0}
.compass-mini-ring svg{width:100%;height:100%}
.compass-mini-needle{position:absolute;top:50%;left:50%;width:3px;height:36px;margin-left:-1.5px;margin-top:-30px;transform-origin:bottom center;transition:transform 0.15s ease-out}
.needle-n{width:0;height:0;border-left:3px solid transparent;border-right:3px solid transparent;border-bottom:22px solid var(--danger);margin:0 auto}
.needle-s{width:0;height:0;border-left:3px solid transparent;border-right:3px solid transparent;border-top:12px solid var(--text3);margin:0 auto}
.compass-mini-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;background:var(--text);border-radius:50%}
.compass-mini-vals{flex:1}
.compass-mini-az{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent);line-height:1}
.compass-mini-dir{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:2px}
.compass-mini-elev{font-family:var(--mono);font-size:11px;color:var(--accent2);margin-top:2px}
.compass-mini-elev.warn{color:var(--accent4)}
.compass-status-txt{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:4px}

/* Toast */
.toast-wrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;pointer-events:none}
.toast{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:9px 16px;font-family:var(--mono);font-size:12px;color:var(--text);white-space:nowrap;animation:toastIn 0.2s ease;box-shadow:0 4px 16px rgba(0,0,0,0.5)}
.toast.success{border-color:var(--accent);color:var(--accent)}
.toast.error{border-color:var(--danger);color:var(--danger)}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes toastIn{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">🌿 JAPI CAMPO</div>
    <div class="header-sub" id="headerSub">Conectando...</div>
  </div>
  <div class="sync-dot" id="syncDot"></div>
</div>

<div class="main">

  <!-- OBSERVADOR — GPS first -->
  <div class="card">
    <div class="card-head">📍 Sua posição</div>
    <div class="card-body">
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px;">
        <div style="flex:1;">
          <input type="text" id="observerName" placeholder="Seu nome / identificação"
            style="width:100%;background:var(--bg);border:1px solid var(--border);
                   border-radius:8px;color:var(--text);font-family:var(--sans);
                   font-size:15px;padding:10px 12px;outline:none;"
            oninput="onObserverNameInput(this.value)">
        </div>
        <div class="gps-badge" id="gpsBadge" style="flex-shrink:0;">📡 GPS...</div>
      </div>

      <!-- Atalho: vizinhos cadastrados (colapsável) -->
      <div>
        <button onclick="toggleKnownPts()" style="
          background:none;border:none;color:var(--text3);font-family:var(--mono);
          font-size:11px;cursor:pointer;padding:0;display:flex;align-items:center;gap:5px;">
          <span id="knownPtsArrow">▶</span> usar local cadastrado
        </button>
        <div id="knownPtsGrid" style="display:none;margin-top:8px;">
          <div class="observer-grid" id="observerGrid"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- CÂMERA + BÚSSOLA -->
  <div class="card">
    <div class="card-head">📷 Aponte para o alvo e fotografe</div>
    <div class="card-body">

      <!-- Viewfinder -->
      <div class="viewfinder-wrap" id="viewfinderWrap">
        <video id="videoEl" autoplay playsinline muted></video>
        <canvas id="canvasEl" style="display:none;position:absolute;top:0;left:0;"></canvas>

        <!-- Overlay HUD -->
        <div class="vf-overlay" id="vfOverlay">
          <!-- Linha do horizonte -->
          <div class="horizon-line" id="horizonLine" style="top:50%"></div>

          <!-- Crosshair -->
          <div class="crosshair"></div>
          <div class="crosshair-ring"></div>
          <div class="corner tl"></div>
          <div class="corner tr"></div>
          <div class="corner bl"></div>
          <div class="corner br"></div>

          <!-- HUD topo -->
          <div class="hud-top">
            <div class="hud-az"><span id="hudAz">---</span>° <span id="hudDir"></span></div>
            <div class="hud-right">
              <div class="hud-elev" id="hudElev">Elev: --°</div>
              <div id="hudObserver" style="font-size:10px;color:var(--text3);margin-top:2px;"></div>
            </div>
          </div>

          <!-- HUD rodapé -->
          <div class="hud-bottom">
            <div class="hud-observer" id="hudTarget"></div>
            <div class="hud-time" id="hudTime"></div>
          </div>
        </div>

        <!-- Error state -->
        <div class="camera-error" id="cameraError" style="display:none;">
          <div class="err-icon">📷</div>
          <div id="cameraErrorMsg">Câmera não iniciada</div>
          <button onclick="startCamera()">Ativar câmera</button>
        </div>
      </div>

      <!-- Bússola compacta + valores -->
      <div class="compass-mini" id="compassMini">
        <div class="compass-mini-ring">
          <svg viewBox="0 0 48 48">
            <circle cx="24" cy="24" r="22" fill="none" stroke="#1e2e1e" stroke-width="1.5"/>
            <text x="24" y="7" text-anchor="middle" fill="#4a6a4a" font-family="monospace" font-size="6" font-weight="bold">N</text>
            <text x="24" y="46" text-anchor="middle" fill="#4a6a4a" font-family="monospace" font-size="5">S</text>
            <text x="44" y="26" text-anchor="middle" fill="#4a6a4a" font-family="monospace" font-size="5">L</text>
            <text x="4"  y="26" text-anchor="middle" fill="#4a6a4a" font-family="monospace" font-size="5">O</text>
          </svg>
          <div class="compass-mini-needle" id="miniNeedle">
            <div class="needle-n"></div>
            <div class="needle-s"></div>
          </div>
          <div class="compass-mini-center"></div>
        </div>
        <div class="compass-mini-vals">
          <div class="compass-mini-az"><span id="azVal">---</span>°</div>
          <div class="compass-mini-dir" id="azDir">aguardando bússola</div>
          <div class="compass-mini-elev" id="elevDisplay">Elev: --°</div>
          <div class="compass-status-txt" id="compassStatus">Toque para ativar bússola</div>
        </div>
      </div>

      <!-- Bússola: botão explícito para iOS -->
      <div id="compassActivateWrap" style="margin:6px 0;">
        <button id="compassActivateBtn" onclick="activateCompass()" style="
          width:100%;padding:10px;border:1px solid var(--accent2);border-radius:8px;
          background:rgba(96,165,250,0.08);color:var(--accent2);font-family:var(--mono);
          font-size:12px;font-weight:700;cursor:pointer;letter-spacing:0.5px;
          display:flex;align-items:center;justify-content:center;gap:8px;">
          🧭 ATIVAR BÚSSOLA
        </button>
      </div>

      <!-- Shutter -->
      <div class="shutter-wrap">
        <button class="flip-btn" id="flipBtn" onclick="flipCamera()" title="Virar câmera">🔄</button>
        <button class="shutter-btn" id="shutterBtn" onclick="capturePhoto()" disabled title="Fotografar">📸</button>
        <div style="width:40px"></div><!-- spacer -->
      </div>

      <!-- Preview após captura -->
      <div class="capture-preview" id="capturePreview">
        <div class="capture-preview-inner">
          <img id="captureThumb" alt="">
          <div class="capture-preview-data">
            <div class="capture-preview-az" id="captureAzTxt">Az: ---°</div>
            <div class="capture-preview-dir" id="captureDirTxt"></div>
            <div class="capture-preview-size" id="captureSizeTxt"></div>
          </div>
          <button class="capture-clear" onclick="clearCapture()">✕</button>
        </div>
        <div class="photo-progress" id="photoProgress">
          <div class="photo-progress-bar" id="photoProgressBar"></div>
        </div>
        <div class="photo-status" id="photoStatus"></div>
      </div>

    </div>
  </div>

  <!-- ALVO -->
  <div class="card">
    <div class="card-head">🎯 O que você está observando</div>
    <div class="card-body">
      <input class="target-input" type="text" id="targetInput" placeholder="Ex: Fumaça no Pico, Balão, Animal...">
    </div>
  </div>

  <!-- REGISTRAR -->
  <button class="register-btn" id="registerBtn" onclick="registerObservation()" disabled>
    <span>📡</span> REGISTRAR OBSERVAÇÃO
  </button>

  <!-- RECENTES -->
  <div class="card">
    <div class="card-head">🕐 Registros desta sessão</div>
    <div class="card-body" id="recentList">
      <div class="recent-empty">Nenhum registro ainda</div>
    </div>
  </div>

</div>

<div class="toast-wrap" id="toastWrap"></div>

<script type="module">
import { initializeApp }     from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc,
         serverTimestamp }   from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ── FIREBASE ─────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyBWrcnCf9b1XxiHaK5Anag6ipCYlISj8Oo",
  authDomain:        "japi-triangulacao.firebaseapp.com",
  projectId:         "japi-triangulacao",
  storageBucket:     "japi-triangulacao.firebasestorage.app",
  messagingSenderId: "751394813503",
  appId:             "1:751394813503:web:3bae2114b376300a2e6a8a"
};
const fbApp = initializeApp(firebaseConfig);
const db    = collection(getFirestore(fbApp), 'observacoes');
document.getElementById('syncDot').className   = 'sync-dot ok';
document.getElementById('headerSub').textContent = 'Online · japi-triangulacao';

// ── CLOUDINARY ───────────────────────────────────────────
const CL_CLOUD  = 'douw7pyl4';
const CL_PRESET = 'japi_campo';
const CL_URL    = `https://api.cloudinary.com/v1_1/${CL_CLOUD}/image/upload`;

// ── PONTOS PADRÃO ────────────────────────────────────────
const PONTOS_PADRAO = [
  { nome:'Guto',      lat:-23.2802, lon:-46.9226, descricao:'Trav Xango' },
  { nome:'Neco',      lat:-23.2806, lon:-46.9013, descricao:'Paiol' },
  { nome:'Sta Clara', lat:-23.2524, lon:-46.8989, descricao:'Vila' },
  { nome:'Baleia',    lat:-23.2221, lon:-46.8914, descricao:'Pedra' },
  { nome:'Paiol',     lat:-23.2170, lon:-46.9400, descricao:'Bar' },
  { nome:'Rua3',      lat:-23.2200, lon:-46.9350, descricao:'Guarita' },
];

// ── STATE ────────────────────────────────────────────────
let selectedObserver = null;
let currentAz        = null;
let currentElev      = null;
let capturedAz       = null;
let capturedElev     = null;
let photoBlob        = null;   // compressed image blob
let photoCloudUrl    = null;
let compassActive    = false;
let lastAlpha        = null;
let gpsCoords        = null;
let videoStream      = null;
let facingMode       = 'environment';  // rear camera
let sessionRecords   = [];

// ── DOM refs ─────────────────────────────────────────────
const videoEl      = document.getElementById('videoEl');
const canvasEl     = document.getElementById('canvasEl');
const shutterBtn   = document.getElementById('shutterBtn');
const registerBtn  = document.getElementById('registerBtn');
const hudAzEl      = document.getElementById('hudAz');
const hudDirEl     = document.getElementById('hudDir');
const hudElevEl    = document.getElementById('hudElev');
const hudObsEl     = document.getElementById('hudObserver');
const hudTargetEl  = document.getElementById('hudTarget');
const hudTimeEl    = document.getElementById('hudTime');
const horizonLine  = document.getElementById('horizonLine');
const azValEl      = document.getElementById('azVal');
const azDirEl      = document.getElementById('azDir');
const elevDisplay  = document.getElementById('elevDisplay');
const miniNeedle   = document.getElementById('miniNeedle');
const compassStatus= document.getElementById('compassStatus');

// ── OBSERVER: GPS-FIRST ──────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('observerGrid');
  grid.innerHTML = '';
  PONTOS_PADRAO.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'obs-btn';
    btn.innerHTML = `<b>${p.nome}</b><span>${p.descricao}</span>`;
    btn.onclick = () => {
      document.querySelectorAll('.obs-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      // Use preset coords but keep GPS running for accuracy info
      selectedObserver = { nome:p.nome, lat:p.lat, lon:p.lon, isPreset:true };
      document.getElementById('observerName').value = p.nome;
      hudObsEl.textContent = p.nome;
      // Collapse grid after selection
      document.getElementById('knownPtsGrid').style.display = 'none';
      document.getElementById('knownPtsArrow').textContent = '▶';
      checkReady();
    };
    grid.appendChild(btn);
  });
}

window.toggleKnownPts = function() {
  const grid  = document.getElementById('knownPtsGrid');
  const arrow = document.getElementById('knownPtsArrow');
  const open  = grid.style.display === 'none';
  grid.style.display  = open ? 'block' : 'none';
  arrow.textContent   = open ? '▼' : '▶';
};

window.onObserverNameInput = function(val) {
  if (selectedObserver) {
    selectedObserver.nome = val || 'Obs';
  } else if (gpsCoords) {
    selectedObserver = { nome: val || 'Obs', lat: gpsCoords.lat, lon: gpsCoords.lon };
  }
  hudObsEl.textContent = val || '';
  checkReady();
};

// ── GPS — sempre ativo, fonte primária de posição ─────────
function startGPS() {
  const badge = document.getElementById('gpsBadge');
  badge.className = 'gps-badge searching';
  badge.textContent = '📡 buscando...';

  if (!navigator.geolocation) {
    badge.className = 'gps-badge';
    badge.textContent = 'sem GPS';
    return;
  }

  // watchPosition: atualiza continuamente
  navigator.geolocation.watchPosition(pos => {
    const acc = Math.round(pos.coords.accuracy);
    gpsCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude };

    badge.className   = 'gps-badge ok';
    badge.innerHTML   = `${gpsCoords.lat.toFixed(5)}<br>${gpsCoords.lon.toFixed(5)}<br>±${acc}m`;

    // Always update selectedObserver coords from GPS (unless preset was chosen)
    const name = document.getElementById('observerName').value.trim() || null;
    if (!selectedObserver?.isPreset) {
      selectedObserver = name
        ? { nome: name, lat: gpsCoords.lat, lon: gpsCoords.lon }
        : null;
    }
    checkReady();
  }, () => {
    badge.className   = 'gps-badge';
    badge.textContent = '⚠️ GPS falhou';
  }, { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 });
}

// ── CAMERA ───────────────────────────────────────────────
async function startCamera() {
  document.getElementById('cameraError').style.display = 'none';

  // iOS Safari requer HTTPS para getUserMedia
  if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
    showCameraError('Câmera requer HTTPS — acesse via gutocarv.github.io');
    return;
  }
  if (!navigator.mediaDevices?.getUserMedia) {
    showCameraError('Câmera não suportada neste browser — tente Safari ou Chrome');
    return;
  }

  try {
    if (videoStream) videoStream.getTracks().forEach(t => t.stop());

    // iOS não aceita width/height constraints junto com facingMode em alguns casos
    // Tenta primeiro com constraints ideais, fallback sem elas
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width:{ ideal:1280 }, height:{ ideal:960 } },
        audio: false
      });
    } catch(e) {
      // Fallback: só facingMode, sem resolução específica
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode },
        audio: false
      });
    }

    videoStream = stream;
    videoEl.srcObject = stream;
    videoEl.style.display = 'block';
    shutterBtn.disabled = false;
    startCompass();
  } catch(err) {
    const msgs = {
      'NotAllowedError':  'Permissão de câmera negada — vá em Ajustes > Safari > Câmera',
      'NotFoundError':    'Nenhuma câmera encontrada neste dispositivo',
      'NotReadableError': 'Câmera em uso por outro app — feche e tente novamente',
      'OverconstrainedError': 'Configuração de câmera não suportada',
    };
    showCameraError(msgs[err.name] || 'Erro: ' + err.message);
  }
}

function showCameraError(msg) {
  videoEl.style.display = 'none';
  document.getElementById('cameraError').style.display = 'flex';
  document.getElementById('cameraErrorMsg').textContent = msg;
}

window.flipCamera = function() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  startCamera();
};

// ── COMPASS ──────────────────────────────────────────────
function azToDir(az) {
  const dirs = [[0,'N'],[22.5,'NNE'],[45,'NE'],[67.5,'ENE'],[90,'L'],[112.5,'ESE'],
    [135,'SE'],[157.5,'SSE'],[180,'S'],[202.5,'SSO'],[225,'SO'],[247.5,'OSO'],
    [270,'O'],[292.5,'ONO'],[315,'NO'],[337.5,'NNO'],[360,'N']];
  for (let i=dirs.length-1; i>=0; i--) if (az >= dirs[i][0]-11.25) return dirs[i][1];
  return 'N';
}

// activateCompass: chamado por botão explícito — garante contexto de gesto no iOS
window.activateCompass = function() {
  if (compassActive) return;
  const btn  = document.getElementById('compassActivateBtn');
  const wrap = document.getElementById('compassActivateWrap');

  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS 13+ — requestPermission DEVE ser chamado aqui, direto no tap
    DeviceOrientationEvent.requestPermission()
      .then(state => {
        if (state === 'granted') {
          attachCompass();
          wrap.style.display = 'none';
        } else {
          btn.textContent = '⚠️ Permissão negada — Ajustes > Safari > Movimento';
          btn.style.borderColor = 'var(--danger)';
          btn.style.color       = 'var(--danger)';
        }
      })
      .catch(err => {
        btn.textContent = '⚠️ Erro: ' + err.message;
      });
  } else {
    // Android / outros — sem requestPermission necessário
    attachCompass();
    wrap.style.display = 'none';
  }
};

function startCompass() {
  // Chamado internamente (não por gesto) — só funciona no Android
  // No iOS o botão explícito é necessário
  if (compassActive) return;
  if (typeof DeviceOrientationEvent?.requestPermission !== 'function') {
    // Não é iOS — ativa direto
    attachCompass();
    const wrap = document.getElementById('compassActivateWrap');
    if (wrap) wrap.style.display = 'none';
  }
  // iOS: aguarda o usuário tocar no botão — não faz nada aqui
}

function attachCompass() {
  compassActive = true;
  compassStatus.textContent = '🧭 Bússola ativa';
  let gotAbsolute = false;
  window.addEventListener('deviceorientationabsolute', e => {
    gotAbsolute = true;
    handleOrientation(e);
  }, true);
  // Fallback para deviceorientation se absolute não disparar em 600ms
  setTimeout(() => {
    if (!gotAbsolute) {
      window.addEventListener('deviceorientation', handleOrientation, true);
    }
  }, 600);
}

function handleOrientation(e) {
  let az = null;
  if (typeof e.webkitCompassHeading === 'number' && !isNaN(e.webkitCompassHeading)) {
    az = e.webkitCompassHeading;
  } else if (e.absolute===true && e.alpha!==null && !isNaN(e.alpha)) {
    az = (360 - e.alpha + 360) % 360;
  } else if (e.alpha!==null && !isNaN(e.alpha)) {
    az = (360 - e.alpha + 360) % 360;
  }
  if (az===null) return;
  az = ((az%360)+360)%360;
  if (lastAlpha!==null) {
    let diff = az - lastAlpha;
    if (diff>180) diff-=360; if (diff<-180) diff+=360;
    az = lastAlpha + diff*0.25;
    az = ((az%360)+360)%360;
  }
  lastAlpha = az;
  currentAz = az;

  // Elevation from beta
  if (e.beta!==null && !isNaN(e.beta)) {
    currentElev = Math.max(-90, Math.min(90, e.beta - 90));
  }

  updateCompassUI();
  checkReady();
}

function updateCompassUI() {
  const az   = currentAz;
  const elev = currentElev;
  const dir  = az!==null ? azToDir(az) : '--';
  const azTxt = az!==null ? Math.round(az).toString().padStart(3,'0') : '---';

  // Mini compass
  azValEl.textContent = azTxt;
  azDirEl.textContent = dir;
  if (az!==null) miniNeedle.style.transform = `rotate(${az}deg)`;

  // HUD
  hudAzEl.textContent  = azTxt;
  hudDirEl.textContent = dir;

  // Elevation
  if (elev!==null) {
    const elevTxt = (elev>=0?'+':'') + Math.round(elev) + '°';
    const warn    = Math.abs(elev) > 30;
    elevDisplay.textContent  = `Elev: ${elevTxt}${warn?' ⚠️':''}`;
    elevDisplay.className    = `compass-mini-elev${warn?' warn':''}`;
    hudElevEl.textContent    = `Elev: ${elevTxt}${warn?' ⚠️':''}`;
    hudElevEl.className      = `hud-elev${warn?' warn':''}`;
    // Horizon line: center=50%, ±1% per degree
    const pct = 50 - elev * 0.8;
    horizonLine.style.top = Math.max(5, Math.min(95, pct)) + '%';
  }
}

// Live clock on HUD
setInterval(() => {
  hudTimeEl.textContent = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}, 1000);

// ── CAPTURE PHOTO ────────────────────────────────────────
window.capturePhoto = function() {
  if (!videoEl.srcObject) return;

  // Freeze azimute + elev at this exact moment
  capturedAz   = currentAz;
  capturedElev = currentElev;

  // Draw video frame to canvas
  const vw = videoEl.videoWidth  || 1280;
  const vh = videoEl.videoHeight || 960;

  // ── COMPRESSION: max 1200px on longest side, quality 0.82 ──
  const MAX = 1200;
  let w = vw, h = vh;
  if (Math.max(w,h) > MAX) {
    if (w > h) { h = Math.round(h * MAX/w); w = MAX; }
    else       { w = Math.round(w * MAX/h); h = MAX; }
  }
  canvasEl.width  = w;
  canvasEl.height = h;
  const ctx = canvasEl.getContext('2d');
  ctx.drawImage(videoEl, 0, 0, w, h);

  // ── OVERLAY: burn HUD data onto the image ──────────────
  const az   = capturedAz   !== null ? Math.round(capturedAz)   : null;
  const elev = capturedElev !== null ? Math.round(capturedElev) : null;
  const now  = new Date().toLocaleString('pt-BR');
  const obs  = selectedObserver?.nome || '';

  ctx.save();
  // Semi-transparent bar at bottom
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, h-48, w, 48);
  ctx.fillStyle = '#4ade80';
  ctx.font      = `bold ${Math.round(w/40)}px monospace`;
  ctx.fillText(az!==null ? `Az: ${az}°  ${azToDir(az)}` : 'Az: --', 12, h-28);
  ctx.fillStyle = '#60a5fa';
  ctx.font      = `${Math.round(w/52)}px monospace`;
  ctx.fillText(elev!==null ? `Elev: ${elev>0?'+':''}${elev}°` : '', 12, h-10);
  ctx.fillStyle = '#86a886';
  ctx.font      = `${Math.round(w/55)}px monospace`;
  ctx.textAlign = 'right';
  ctx.fillText(`${obs}  ${now}`, w-12, h-10);
  // Crosshair mark
  const cx=w/2, cy=h/2, cs=Math.round(w/18);
  ctx.strokeStyle='rgba(74,222,128,0.7)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(cx-cs,cy); ctx.lineTo(cx+cs,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,cy-cs); ctx.lineTo(cx,cy+cs); ctx.stroke();
  ctx.restore();

  // Convert to blob
  // toBlob com fallback para toDataURL (iOS Safari antigo)
  function canvasToBlob(canvas, cb, type, quality) {
    if (canvas.toBlob) {
      canvas.toBlob(cb, type, quality);
    } else {
      // Fallback: toDataURL → Blob
      const dataUrl = canvas.toDataURL(type, quality);
      const arr = dataUrl.split(','), mime = arr[0].match(/:(.*?);/)[1];
      const bstr = atob(arr[1]);
      let n = bstr.length;
      const u8 = new Uint8Array(n);
      while (n--) u8[n] = bstr.charCodeAt(n);
      cb(new Blob([u8], { type: mime }));
    }
  }

  canvasToBlob(canvasEl, blob => {
    photoBlob     = blob;
    photoCloudUrl = null;
    const origKB  = Math.round(vw*vh*3/1024);
    const compKB  = Math.round(blob.size/1024);

    // Show preview
    const url = URL.createObjectURL(blob);
    document.getElementById('captureThumb').src       = url;
    document.getElementById('captureAzTxt').textContent =
      az!==null ? `Az: ${az}° · ${azToDir(az)}` : 'Az: (sem bússola)';
    document.getElementById('captureDirTxt').textContent =
      elev!==null ? `Elev: ${elev>0?'+':''}${elev}°${Math.abs(elev)>30?' ⚠️ alvo elevado':''}` : '';
    document.getElementById('captureSizeTxt').textContent =
      `~${origKB}KB → ${compKB}KB comprimido`;
    document.getElementById('capturePreview').style.display = 'block';
    checkReady();
    toast(`📷 ${az!==null?az+'°':''} capturado · ${compKB}KB`, 'success');
  }, 'image/jpeg', 0.82);
};

window.clearCapture = function() {
  photoBlob     = null;
  photoCloudUrl = null;
  capturedAz    = null;
  capturedElev  = null;
  document.getElementById('capturePreview').style.display = 'none';
  document.getElementById('photoProgress').style.display  = 'none';
  document.getElementById('photoProgressBar').style.width = '0%';
  document.getElementById('photoStatus').textContent      = '';
  checkReady();
};

// ── UPLOAD ───────────────────────────────────────────────
async function uploadPhoto() {
  if (!photoBlob) return null;
  const progress    = document.getElementById('photoProgress');
  const progressBar = document.getElementById('photoProgressBar');
  const status      = document.getElementById('photoStatus');
  progress.style.display = 'block';
  status.textContent = 'Enviando foto...';
  status.className   = 'photo-status uploading';

  return new Promise((resolve, reject) => {
    const fd = new FormData();
    fd.append('file',          photoBlob, 'japi.jpg');
    fd.append('upload_preset', CL_PRESET);
    fd.append('folder',        'japi');
    if (selectedObserver?.nome) fd.append('tags', selectedObserver.nome);

    const xhr = new XMLHttpRequest();
    xhr.open('POST', CL_URL);
    xhr.upload.onprogress = e => {
      if (e.lengthComputable) progressBar.style.width = Math.round(e.loaded/e.total*100)+'%';
    };
    xhr.onload = () => {
      progressBar.style.width = '100%';
      if (xhr.status===200) {
        const d = JSON.parse(xhr.responseText);
        photoCloudUrl = d.secure_url;
        status.textContent = '✅ Foto enviada!';
        status.className   = 'photo-status ok';
        resolve(photoCloudUrl);
      } else {
        status.textContent = '❌ Erro no upload';
        status.className   = 'photo-status err';
        reject(new Error('Upload failed: '+xhr.status));
      }
    };
    xhr.onerror = () => {
      status.textContent = '❌ Sem conexão';
      status.className   = 'photo-status err';
      reject(new Error('Network error'));
    };
    xhr.send(fd);
  });
}

// ── READY CHECK ──────────────────────────────────────────
function checkReady() {
  const hasName = document.getElementById('observerName').value.trim().length > 0;
  const hasPos  = selectedObserver !== null || gpsCoords !== null;
  const hasAz   = capturedAz !== null || currentAz !== null;
  registerBtn.disabled = !(hasName && hasPos && hasAz);
}

// ── REGISTER ─────────────────────────────────────────────
window.registerObservation = async function() {
  const target   = document.getElementById('targetInput').value.trim() || 'Alvo';
  const azSrc    = capturedAz   !== null ? capturedAz   : currentAz;
  const elevSrc  = capturedElev !== null ? capturedElev : currentElev;
  const az       = Math.round(azSrc * 10) / 10;
  const nameVal  = document.getElementById('observerName').value.trim() || 'Obs';

  // Always use live GPS coords if available (unless preset chosen)
  if (selectedObserver && !selectedObserver.isPreset && gpsCoords) {
    selectedObserver.lat = gpsCoords.lat;
    selectedObserver.lon = gpsCoords.lon;
  } else if (!selectedObserver && gpsCoords) {
    selectedObserver = { nome: nameVal, lat: gpsCoords.lat, lon: gpsCoords.lon };
  }
  if (selectedObserver) selectedObserver.nome = nameVal;

  registerBtn.disabled = true;
  registerBtn.innerHTML = '<span>⏳</span> SALVANDO...';

  let fotoUrl = null;
  if (photoBlob) {
    try { fotoUrl = await uploadPhoto(); }
    catch(e) { toast('⚠️ Foto não enviada', 'error'); }
  }

  try {
    const rec = {
      observador: selectedObserver.nome,
      lat:        selectedObserver.lat,
      lon:        selectedObserver.lon,
      azimute:    az,
      elevacao:   elevSrc!==null ? Math.round(elevSrc*10)/10 : null,
      alvo:       target,
      fotoUrl:    fotoUrl,
      ts:         serverTimestamp(),
      tsLocal:    new Date().toISOString(),
    };
    await addDoc(db, rec);
    sessionRecords.unshift({ ...rec, azimute:az });
    renderRecent();
    clearCapture();
    capturedAz = null; capturedElev = null;
    document.getElementById('targetInput').value = '';
    checkReady();
    toast(`✅ ${selectedObserver.nome} → ${target} @ ${az}°`, 'success');
  } catch(err) {
    toast('Erro ao salvar: '+err.message, 'error');
    document.getElementById('syncDot').className = 'sync-dot err';
  }

  registerBtn.innerHTML = '<span>📡</span> REGISTRAR OBSERVAÇÃO';
  checkReady();
};

// ── RECENT ───────────────────────────────────────────────
function renderRecent() {
  const el = document.getElementById('recentList');
  if (!sessionRecords.length) { el.innerHTML='<div class="recent-empty">Nenhum registro ainda</div>'; return; }
  el.innerHTML = sessionRecords.slice(0,8).map(r=>`
    <div class="recent-item">
      <b>${r.observador}</b> → ${r.alvo}<br>
      Az: ${r.azimute}° · ${new Date(r.tsLocal).toLocaleTimeString('pt-BR')}
      ${r.fotoUrl?'· 📷':''}
    </div>`).join('');
}

// ── TOAST ────────────────────────────────────────────────
function toast(msg, type='info') {
  const wrap = document.getElementById('toastWrap');
  const el   = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}

// ── TARGET INPUT → HUD ───────────────────────────────────
document.getElementById('targetInput').addEventListener('input', function() {
  hudTargetEl.textContent = this.value || '';
});

// ── INIT ─────────────────────────────────────────────────
buildGrid();
startGPS();   // GPS starts immediately, no interaction needed

// Camera starts on first user interaction (iOS requires gesture)
document.addEventListener('touchstart', startCamera, { once:true });
document.addEventListener('click',      startCamera, { once:true });

// Name field triggers checkReady
document.getElementById('observerName').addEventListener('input', () => checkReady());

</script>
